<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Logiciel Garage - Accès</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .box {
      background: #121a2f;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    input {
      width: 200px;
    }

    button {
      background: #00c2ff;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    td, th {
      border-bottom: 1px solid #333;
      padding: 8px;
    }
  </style>
</head>

<body style="display:none;">

<h1>🚗 Mon Logiciel Garage</h1>
<p>Bienvenue dans votre espace</p>

<div class="box">
  <h2>Ajouter un client</h2>

  <input id="nom" placeholder="Nom">
  <input id="tel" placeholder="Téléphone">
  <button onclick="ajouterClient()">Ajouter</button>
</div>

<div class="box">
  <h2>Clients</h2>
  <table id="tableClients">
    <tr>
      <th>Nom</th>
      <th>Téléphone</th>
    </tr>
  </table>
</div>

<script>
/* =========================
   🔒 SÉCURITÉ SIMPLE
========================= */

const paid = localStorage.getItem("paid");

if (paid !== "true") {
  window.location.href = "/index.html";
} else {
  document.body.style.display = "block";
}

/* =========================
   🚗 LOGICIEL CLIENTS
========================= */

let clients = JSON.parse(localStorage.getItem("clients")) || [];

function afficherClients() {
  let table = document.getElementById("tableClients");
  table.innerHTML = `
    <tr>
      <th>Nom</th>
      <th>Téléphone</th>
    </tr>
  `;

  clients.forEach(c => {
    table.innerHTML += `
      <tr>
        <td>${c.nom}</td>
        <td>${c.tel}</td>
      </tr>
    `;
  });
}

function ajouterClient() {
  let nom = document.getElementById("nom").value;
  let tel = document.getElementById("tel").value;

  if (!nom) return alert("Nom requis");

  clients.push({ nom, tel });
  localStorage.setItem("clients", JSON.stringify(clients));

  afficherClients();

  document.getElementById("nom").value = "";
  document.getElementById("tel").value = "";
}

afficherClients();
</script>

</body>
</html>
